name: vocab-builder

services:
  db:
    image: postgres:18-bookworm
    restart: always
    shm_size: 128mb
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql
    networks:
      - backend_network

  adminer:
    image: adminer:5.4.2
    restart: always
    ports:
      - "8080:8080"
    networks:
      - backend_network

  backend-server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: always
    env_file:
      - ./.env
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - backend_network

  libretranslate:
    image: libretranslate/libretranslate:v1.9.6
    ports:
      - "5000:5000"
    restart: unless-stopped
    volumes:
      - libretranslate_models:/home/libretranslate/.local:rw
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "./venv/bin/python scripts/healthcheck.py"]
      interval: 10s
      timeout: 4s
      retries: 4
      start_period: 5s

volumes:
  db_data:
  libretranslate_models:

networks:
  backend_network:
