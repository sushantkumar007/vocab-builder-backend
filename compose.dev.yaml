name: vocab-builder-backend

services:
  db:
    image: postgres:18-bookworm
    restart: always
    shm_size: 128mb
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql
    networks:
      - backend-network

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    networks:
      - backend-network

  backend-server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: always
    env_file:
      - ./.env
    ports:
      - "5000:5000"
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - backend-network

volumes:
  db_data:

networks:
  backend-network:
