services:
  db:
    image: postgres:18-bookworm
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
        delay: 10s
      rollback_config:
        parallelism: 1
        order: stop-first
      restart_policy:
        condition: any
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$(cat /run/secrets/postgres-user)" -d "$$(cat /run/secrets/postgres-db)"
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql
      - type: tmpfs
        target: /dev/shm
        tmpfs:
          size: 134217728 # 128*2^20 bytes = 128Mb
    environment:
      - POSTGRES_DB_FILE=/run/secrets/postgres-db
      - POSTGRES_USER_FILE=/run/secrets/postgres-user
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres-password
    secrets:
      - postgres-db
      - postgres-user
      - postgres-password
    networks:
      - backend_network

  backend-server:
    image: sushantkumar007/vocab-builder-backend:${IMAGE_TAG}
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 10s
      rollback_config:
        parallelism: 1
        order: start-first
      restart_policy:
        condition: any
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --tries=1
        - --spider
        - http://localhost:3000/api/v1/health
      interval: 10s
      timeout: 5s
      retries: 3
    env_file:
      - ./.env
    environment:
      - DATABASE_URL_FILE=/run/secrets/database-url
      - ACCESS_TOKEN_SECRET_FILE=/run/secrets/access-token-secret
      - ACCESS_TOKEN_EXPIRATION_FILE=/run/secrets/access-token-expiration
      - REFRESH_TOKEN_SECRET_FILE=/run/secrets/refresh-token-secret
      - REFRESH_TOKEN_EXPIRATION_FILE=/run/secrets/refresh-token-expiration
      - SMTP_HOST_FILE=/run/secrets/smtp-host
      - SMTP_PORT_FILE=/run/secrets/smtp-port
      - SMTP_USER_FILE=/run/secrets/smtp-user
      - SMTP_PASS_FILE=/run/secrets/smtp-pass
      - SMTP_FROM_FILE=/run/secrets/smtp-from
      - ADMIN_EMAIL_FILE=/run/secrets/admin-email
      - ADMIN_PASSWORD_FILE=/run/secrets/admin-password
    secrets:
      - database-url
      - access-token-secret
      - access-token-expiration
      - refresh-token-secret
      - refresh-token-expiration
      - smtp-host
      - smtp-port
      - smtp-user
      - smtp-pass
      - smtp-from
      - admin-email
      - admin-password
    networks:
      - backend_network

  caddy:
    image: caddy:2-alpine
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
        delay: 10s
      rollback_config:
        parallelism: 1
        order: stop-first
      restart_policy:
        condition: any
    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --tries=1
        - --spider
        - http://localhost/health
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    configs:
      - source: Caddyfile
        target: /etc/caddy/Caddyfile
    networks:
      - backend_network

  libretranslate:
    image: sushantkumar007/libretranslate:v1.9.6-all-models
    ports:
      - "5000:5000"
    deploy:
      replicas: 1
      update_config:
        order: start-first
        failure_action: rollback
        delay: 10s
      rollback_config:
        parallelism: 1
        order: start-first
    volumes:
      - libretranslate_models:/home/libretranslate/.local:rw
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "./venv/bin/python scripts/healthcheck.py"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

networks:
  backend_network:

secrets:
  postgres-db:
    external: true
  postgres-user:
    external: true
  postgres-password:
    external: true
  database-url:
    external: true
  access-token-secret:
    external: true
  access-token-expiration:
    external: true
  refresh-token-secret:
    external: true
  refresh-token-expiration:
    external: true
  smtp-host:
    external: true
  smtp-port:
    external: true
  smtp-user:
    external: true
  smtp-pass:
    external: true
  smtp-from:
    external: true
  admin-email:
    external: true
  admin-password:
    external: true

volumes:
  db_data:
  libretranslate_models:
  caddy_data:
  caddy_config:

configs:
  Caddyfile:
    file: ./Caddyfile
